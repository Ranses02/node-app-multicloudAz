<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Imágenes MultiCloud</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Galería de Imágenes de Azure Blob Storage</h1>
        <p>Las imágenes que subas a tu contenedor aparecerán aquí automáticamente.</p>
    </header>

    <main>
        <div id="galeria" class="galeria-container">
            <p id="loading">Cargando imágenes desde la nube...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const galeria = document.getElementById('galeria');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch('/api/imagenes');
                const imagenes = await response.json();

                loading.style.display = 'none';

                if (imagenes.length === 0) {
                    galeria.innerHTML = '<p class="no-data">El contenedor de Azure está vacío. Sube imágenes desde el portal para verlas aquí.</p>';
                    return;
                }

                // Limpiar contenedor y renderizar las imágenes de Azure
                galeria.innerHTML = '';
                imagenes.forEach(img => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    
                    card.innerHTML = `
                        <img src="${img.url}" alt="${img.nombre}" crossorigin="anonymous">
                        <div class="image-info">
                            <span>${img.nombre}</span>
                        </div>
                    `;
                    galeria.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                loading.innerText = 'Error al conectar con el servidor o cargar Azure.';
            }
        });
    </script>
</body>
</html>
